# TaskFlow アプリケーション Docker Compose 定義
# Compose V2 形式

services:
  # =============================================
  # データベース (PostgreSQL)
  # =============================================
  db:
    image: postgres:16-alpine
    container_name: taskflow-db
    ports:
      - ${DB_PORT:-5432}:5432
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-taskflow}
      POSTGRES_USER: ${POSTGRES_USER:-taskflow_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taskflow_pass}
    volumes:
      - taskflow-db-data:/var/lib/postgresql/data
    networks:
      - taskflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taskflow_user} -d ${POSTGRES_DB:-taskflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # =============================================
  # メール開発サーバー (Mailpit)
  # =============================================
  mailpit:
    image: axllent/mailpit:latest
    container_name: taskflow-mailpit
    ports:
      - ${MAILPIT_SMTP_PORT:-1025}:1025
      - ${MAILPIT_UI_PORT:-8025}:8025
    networks:
      - taskflow-network
    restart: unless-stopped

  # =============================================
  # バックエンド API (ASP.NET Core)
  # =============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskflow-backend
    ports:
      - ${BACKEND_PORT:-5000}:5000
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=${POSTGRES_DB:-taskflow};Username=${POSTGRES_USER:-taskflow_user};Password=${POSTGRES_PASSWORD:-taskflow_pass}
      # JWT_SECRET_KEY のデフォルト値は開発専用です。本番環境では必ず安全な値を設定してください。
      Jwt__SecretKey: ${JWT_SECRET_KEY:-ThisIsADevelopmentSecretKeyThatShouldBeAtLeast32CharactersLong!}
      Jwt__Issuer: ${JWT_ISSUER:-taskflow-api}
      Jwt__Audience: ${JWT_AUDIENCE:-taskflow-frontend}
      Jwt__AccessTokenExpirationMinutes: ${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:-15}
      Jwt__RefreshTokenExpirationDays: ${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:-7}
      Email__SmtpHost: mailpit
      Email__SmtpPort: 1025
      Email__FromAddress: ${EMAIL_FROM_ADDRESS:-noreply@taskflow.local}
      Frontend__BaseUrl: http://localhost:${FRONTEND_PORT:-3000}
    volumes:
      - ./backend:/app
    networks:
      - taskflow-network
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started
    restart: unless-stopped

  # =============================================
  # フロントエンド (Next.js)
  # =============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskflow-frontend
    ports:
      - ${FRONTEND_PORT:-3000}:3000
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_PORT:-5000}
    volumes:
      - ./frontend:/app
      - /app/node_modules  # 匿名ボリュームで node_modules を除外
    networks:
      - taskflow-network
    depends_on:
      - backend
    restart: unless-stopped

# =============================================
# ネットワーク定義
# =============================================
networks:
  taskflow-network:
    driver: bridge

# =============================================
# ボリューム定義
# =============================================
volumes:
  taskflow-db-data:
    driver: local
